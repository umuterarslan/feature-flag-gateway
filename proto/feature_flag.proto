syntax = "proto3";

package featureflag;

service FlagService {
    rpc IsFeatureEnabled (FlagRequest) returns (FlagResponse);

    rpc StreamFlags (StreamRequest) returns (stream FlagUpdate);
}

message FlagRequest {
    string key = 1;
    map<string, string> context = 2;
}

message FlagResponse {
    bool enabled = 1;
}

message StreamRequest {
    string key = 1;
}
message FlagUpdate {
    string key = 1;
    bool enabled = 2;
    map<string, string> conditions = 3;
}